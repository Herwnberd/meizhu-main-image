<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI生图工单系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .status-pending { color: #f59e0b; }
        .status-processing { color: #3b82f6; }
        .status-completed { color: #10b981; }
        .status-failed { color: #ef4444; }
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold gradient-text bg-clip-text text-transparent bg-gradient-to-r from-purple-600 to-blue-500 mb-2">AI生图工单系统</h1>
            <p class="text-gray-600">上传Excel工单，自动处理图片生成任务</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-lg p-6 card-hover transition-all duration-300">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    创建工单
                </h2>
                <div id="uploadForm" class="space-y-4">
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-purple-500 transition-colors cursor-pointer" onclick="document.getElementById('fileInput').click()">
                        <input type="file" id="fileInput" class="hidden" accept=".xlsx,.xls" multiple onchange="handleFileSelect(event)">
                        <svg class="w-12 h-12 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        <p class="text-gray-600 mb-2">点击或拖拽文件到此处</p>
                        <p class="text-sm text-gray-400">支持 .xlsx, .xls 格式</p>
                    </div>
                    <div id="fileList" class="space-y-2"></div>
                    <button id="submitBtn" class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed" onclick="submitOrder()" disabled>
                        提交工单
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-lg p-6 card-hover transition-all duration-300">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    工单列表
                </h2>
                <div id="orderList" class="space-y-3 max-h-96 overflow-y-auto">
                    <p class="text-gray-400 text-center py-8">暂无工单</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold flex items-center">
                    <svg class="w-6 h-6 mr-2 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    下载记录
                </h2>
                <button onclick="loadZipList()" class="text-purple-600 hover:text-purple-700 text-sm">刷新</button>
            </div>
            <div id="zipList" class="space-y-3">
                <p class="text-gray-400 text-center py-4">暂无下载记录</p>
            </div>
        </div>
    </div>

    <script>
        // ============ 后端API地址配置 ============
        // 部署到帽子云后，修改这里为真实的火山引擎Web函数地址！
        // 例如：https://你 的域名.apigateway-cn-guangzhou.volceapi.com/api/v1
        const API_BASE = 'https://sd89rlr7al3l0dlonbq20.apigateway-cn-guangzhou.volceapi.com/api/v1';
        // ==========================================
        let selectedFiles = [];
        
        function showTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bg-purple-600', 'text-white'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            btn.classList.add('bg-purple-600', 'text-white');
            document.getElementById(tab).classList.remove('hidden');
        }
        
        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                if (!selectedFiles.find(f => f.name === file.name)) {
                    selectedFiles.push(file);
                }
            });
            updateFileList();
        }
        
        function updateFileList() {
            const fileList = document.getElementById('fileList');
            const submitBtn = document.getElementById('submitBtn');
            
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '';
                submitBtn.disabled = true;
                return;
            }
            
            fileList.innerHTML = selectedFiles.map((file, index) => `
                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-lg">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 text-green-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <span class="text-sm">${file.name}</span>
                    </div>
                    <button onclick="removeFile(${index})" class="text-red-500 hover:text-red-700">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            `).join('');
            
            submitBtn.disabled = selectedFiles.length === 0;
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        }
        
        async function submitOrder() {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '提交中...';
            
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });
            
            try {
                const response = await fetch(`${API_BASE}/orders`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('工单创建成功！', 'success');
                    selectedFiles = [];
                    updateFileList();
                    loadOrders();
                } else {
                    showToast(data.detail || '创建失败', 'error');
                }
            } catch (error) {
                showToast('网络错误：' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '提交工单';
            }
        }
        
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE}/orders`);
                const data = await response.json();
                
                const orderList = document.getElementById('orderList');
                
                if (!data.orders || data.orders.length === 0) {
                    orderList.innerHTML = '<p class="text-gray-400 text-center py-8">暂无工单</p>';
                    return;
                }
                
                orderList.innerHTML = data.orders.map(order => {
                    const statusClass = `status-${order.status}`;
                    const statusText = {pending: '等待中', processing: '处理中', completed: '已完成', failed: '失败'}[order.status] || order.status;
                    const progress = order.total_tasks > 0 ? (order.current_task / order.total_tasks * 100) : 0;
                    
                    return `
                        <div class="bg-gray-50 p-4 rounded-lg fade-in">
                            <div class="flex items-center justify-between mb-2">
                                <div>
                                    <h3 class="font-medium">${order.order_name}</h3>
                                    <p class="text-xs text-gray-400">ID: ${order.order_id}</p>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <span class="${statusClass} text-sm font-medium">${statusText}</span>
                                    <button onclick="deleteOrder('${order.order_id}')" class="text-red-500 hover:text-red-700 p-1">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            ${order.status === 'processing' ? `
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${progress}%"></div>
                                </div>
                                <p class="text-xs text-gray-400 mt-1">${order.current_task} / ${order.total_tasks}</p>
                            ` : ''}
                        </div>
                    `;
                }).join('');
                
                setTimeout(loadOrders, 3000);
            } catch (error) {
                console.error('加载工单失败:', error);
            }
        }
        
        async function loadZipList() {
            try {
                const response = await fetch(`${API_BASE}/zips`);
                const data = await response.json();
                
                const zipList = document.getElementById('zipList');
                
                if (!data.zips || data.zips.length === 0) {
                    zipList.innerHTML = '<p class="text-gray-400 text-center py-4">暂无下载记录</p>';
                    return;
                }
                
                zipList.innerHTML = data.zips.map(zip => `
                    <div class="bg-gray-50 p-4 rounded-lg flex items-center justify-between">
                        <div>
                            <h3 class="font-medium">${zip.order_name}</h3>
                            <p class="text-xs text-gray-400">ID: ${zip.order_id}</p>
                        </div>
                        <a href="${zip.zip_url}" download class="gradient-bg text-white px-4 py-2 rounded-lg text-sm hover:opacity-90">
                            下载ZIP
                        </a>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载下载记录失败:', error);
            }
        }
        
        async function deleteOrder(orderId) {
            if (!confirm('确定要删除这个工单吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/orders/${orderId}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('工单已删除', 'success');
                    loadOrders();
                } else {
                    showToast(data.detail || '删除失败', 'error');
                }
            } catch (error) {
                showToast('网络错误：' + error.message, 'error');
            }
        }
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadOrders();
            loadZipList();
        });
        
        const uploadForm = document.getElementById('uploadForm');
        uploadForm.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadForm.querySelector('.border-dashed').classList.add('border-purple-500', 'bg-purple-50');
        });
        uploadForm.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadForm.querySelector('.border-dashed').classList.remove('border-purple-500', 'bg-purple-50');
        });
        uploadForm.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadForm.querySelector('.border-dashed').classList.remove('border-purple-500', 'bg-purple-50');
            const files = Array.from(e.dataTransfer.files);
            files.forEach(file => {
                if (!selectedFiles.find(f => f.name === file.name)) {
                    selectedFiles.push(file);
                }
            });
            updateFileList();
        });
    </script>
</body>
</html>
