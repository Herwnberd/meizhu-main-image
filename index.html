<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量生图系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        .drop-zone {
            border: 2px dashed #d1d5db;
            transition: all 0.3s ease;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .progress-bar {
            transition: width 0.5s ease;
        }
        .status-processing {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
    <script>
        function getApiBase() {
            var apiBase = window.location.origin + '/api';
            var meta = document.querySelector('meta[name="api-base"]');
            if (meta) {
                apiBase = meta.getAttribute('content');
            }
            return apiBase;
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-6">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">批量生图系统</h1>
            <p class="text-gray-500">上传Excel工单，自动生成商品图片</p>
        </header>

        <section class="mb-8">
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center">
                    <i class="fa fa-upload mr-2 text-blue-500"></i>上传工单
                </h2>
                <div id="dropZone" class="drop-zone rounded-lg p-8 text-center">
                    <i class="fa fa-file-excel-o text-4xl text-gray-400 mb-4"></i>
                    <p class="text-gray-600 mb-2">点击或拖拽Excel文件到此处上传</p>
                    <p class="text-sm text-gray-400">支持 .xlsx 格式，可同时上传多个文件</p>
                    <input type="file" id="fileInput" accept=".xlsx" multiple class="hidden">
                </div>
                <div id="uploadProgress" class="mt-4 hidden">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-gray-600">上传进度</span>
                        <span id="uploadPercent">0%</span>
                    </div>
                    <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div id="uploadBar" class="h-full bg-blue-500 progress-bar"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="mb-8">
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-gray-700 flex items-center">
                        <i class="fa fa-list-ul mr-2 text-green-500"></i>工单列表
                    </h2>
                    <div class="flex items-center">
                        <span id="queueIndicator" class="text-sm text-gray-500 mr-4 hidden">
                            <i class="fa fa-clock-o"></i> 队列中: <span id="queueCount">0</span> 个任务
                        </span>
                        <span class="text-sm text-gray-500">共 <span id="taskTotal">0</span> 条记录</span>
                    </div>
                </div>
                <div id="taskList" class="space-y-3 max-h-96 overflow-y-auto">
                    <div class="text-center text-gray-400 py-8">
                        <i class="fa fa-inbox text-4xl mb-2"></i>
                        <p>暂无工单，请先上传文件</p>
                    </div>
                </div>
                <div id="taskPagination" class="mt-4 flex justify-center items-center space-x-2 hidden">
                    <button id="taskPrevBtn" class="px-3 py-1 bg-gray-200 text-gray-600 rounded hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <i class="fa fa-chevron-left"></i>
                    </button>
                    <span class="text-sm text-gray-500">第 <span id="taskPage">1</span> 页</span>
                    <button id="taskNextBtn" class="px-3 py-1 bg-gray-200 text-gray-600 rounded hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <i class="fa fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </section>

        <section class="mb-8">
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-gray-700 flex items-center">
                        <i class="fa fa-file-archive-o mr-2 text-purple-500"></i>成品ZIP下载
                    </h2>
                    <span class="text-sm text-gray-500">共 <span id="zipTotal">0</span> 条记录</span>
                </div>
                <div id="zipList" class="space-y-3 max-h-96 overflow-y-auto">
                    <div class="text-center text-gray-400 py-8">
                        <i class="fa fa-download text-4xl mb-2"></i>
                        <p>暂无成品文件</p>
                    </div>
                </div>
                <div id="zipPagination" class="mt-4 flex justify-center items-center space-x-2 hidden">
                    <button id="zipPrevBtn" class="px-3 py-1 bg-gray-200 text-gray-600 rounded hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <i class="fa fa-chevron-left"></i>
                    </button>
                    <span class="text-sm text-gray-500">第 <span id="zipPage">1</span> 页</span>
                    <button id="zipNextBtn" class="px-3 py-1 bg-gray-200 text-gray-600 rounded hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <i class="fa fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </section>

        <div id="taskModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
            <div class="bg-white rounded-xl shadow-xl max-w-lg w-full mx-4 max-h-[80vh] overflow-hidden">
                <div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-4">
                    <div class="flex justify-between items-center">
                        <h3 class="text-lg font-semibold">工单详情</h3>
                        <button id="closeModal" class="text-white hover:bg-white hover:bg-opacity-20 rounded-full p-1">
                            <i class="fa fa-times"></i>
                        </button>
                    </div>
                </div>
                <div id="modalContent" class="p-4">
                    <div class="text-center text-gray-400 py-8">
                        <i class="fa fa-spinner fa-spin text-4xl mb-2"></i>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = getApiBase();
        let refreshInterval;
        
        let taskPage = 1;
        let taskHasMore = false;
        let taskTotal = 0;
        
        let zipPage = 1;
        let zipHasMore = false;
        let zipTotal = 0;

        document.addEventListener('DOMContentLoaded', () => {
            initDropZone();
            loadTasks();
            loadZips();
            initPagination();
            startAutoRefresh();
        });

        function initDropZone() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const files = Array.from(e.dataTransfer.files);
                uploadFiles(files);
            });
            fileInput.addEventListener('change', (e) => {
                const files = Array.from(e.target.files);
                uploadFiles(files);
            });
        }

        async function uploadFiles(files) {
            const validFiles = files.filter(f => f.name.endsWith('.xlsx'));
            if (validFiles.length === 0) {
                alert('请选择Excel文件(.xlsx)');
                return;
            }

            const formData = new FormData();
            validFiles.forEach(f => formData.append('files', f));

            const progressDiv = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('uploadBar');
            const progressPercent = document.getElementById('uploadPercent');

            progressDiv.classList.remove('hidden');
            progressBar.style.width = '0%';
            progressPercent.textContent = '0%';

            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData,
                });

                const result = await response.json();
                if (result.success) {
                    progressBar.style.width = '100%';
                    progressPercent.textContent = '100%';
                    setTimeout(() => {
                        progressDiv.classList.add('hidden');
                        taskPage = 1;
                        loadTasks();
                    }, 500);
                } else {
                    alert('上传失败: ' + result.error);
                }
            } catch (error) {
                alert('上传失败: ' + error.message);
            }
        }

        async function loadTasks(page = 1) {
            try {
                const response = await fetch(`${API_BASE}/tasks?page=${page}&page_size=10`);
                const result = await response.json();
                renderTaskList(result.tasks, result.total, result.page, result.has_more);
            } catch (error) {
                console.error('加载任务失败:', error);
            }
        }

        function renderTaskList(tasks, total, page, hasMore) {
            const taskList = document.getElementById('taskList');
            const queueIndicator = document.getElementById('queueIndicator');
            const queueCount = document.getElementById('queueCount');
            const taskTotal = document.getElementById('taskTotal');
            const taskPageEl = document.getElementById('taskPage');
            const taskPrevBtn = document.getElementById('taskPrevBtn');
            const taskNextBtn = document.getElementById('taskNextBtn');
            const taskPagination = document.getElementById('taskPagination');
            
            taskTotal.textContent = total;
            taskPageEl.textContent = page;
            taskHasMore = hasMore;
            taskPage = page;
            
            taskPrevBtn.disabled = page <= 1;
            taskNextBtn.disabled = !hasMore;
            
            if (total > 10) {
                taskPagination.classList.remove('hidden');
            } else {
                taskPagination.classList.add('hidden');
            }

            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="text-center text-gray-400 py-8">
                        <i class="fa fa-inbox text-4xl mb-2"></i>
                        <p>暂无工单，请先上传文件</p>
                    </div>
                `;
                return;
            }

            const queuedTasks = tasks.filter(t => t.status === 'queued');
            const processingTasks = tasks.filter(t => t.status === 'processing');
            const completedTasks = tasks.filter(t => t.status === 'completed');
            const errorTasks = tasks.filter(t => t.status === 'error');

            const renderTask = (task) => {
                const statusIcon = task.status === 'processing' 
                    ? `<i class="fa fa-spinner fa-spin text-blue-500"></i>`
                    : task.status === 'completed'
                    ? `<i class="fa fa-check-circle text-green-500"></i>`
                    : task.status === 'error'
                    ? `<i class="fa fa-exclamation-circle text-red-500"></i>`
                    : `<i class="fa fa-clock-o text-yellow-500"></i>`;
                
                const statusText = task.status === 'processing'
                    ? `处理中 ${task.progress || 0}%`
                    : task.status === 'completed'
                    ? '已完成'
                    : task.status === 'error'
                    ? '处理失败'
                    : '排期中';

                const statusColor = task.status === 'processing' ? 'text-blue-500' :
                                   task.status === 'completed' ? 'text-green-500' :
                                   task.status === 'error' ? 'text-red-500' : 'text-yellow-500';

                return `
                    <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                ${statusIcon}
                                <span class="ml-3 font-medium text-gray-700">${task.original_filename || '工单 ' + task.task_id.slice(0, 8) + '...'}</span>
                                <span class="ml-2 text-sm ${statusColor}">${statusText}</span>
                            </div>
                            <div class="flex items-center">
                                <button onclick="showTaskDetail('${task.task_id}')" 
                                        class="mr-2 px-3 py-1 text-sm bg-blue-500 text-white rounded hover:bg-blue-600">
                                    <i class="fa fa-eye mr-1"></i>详情
                                </button>
                                <button onclick="deleteTask('${task.task_id}')"
                                        class="px-3 py-1 text-sm bg-red-500 text-white rounded hover:bg-red-600">
                                    <i class="fa fa-trash mr-1"></i>删除
                                </button>
                            </div>
                        </div>
                        ${task.status === 'processing' ? `
                            <div class="mt-3">
                                <div class="flex justify-between text-sm text-gray-500 mb-1">
                                    <span>处理进度</span>
                                    <span>${task.progress || 0}%</span>
                                </div>
                                <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                                    <div class="h-full bg-blue-500 progress-bar" style="width: ${task.progress || 0}%"></div>
                                </div>
                                <p class="text-sm text-gray-400 mt-1">${task.message || ''}</p>
                            </div>
                        ` : task.status === 'error' ? `
                            <div class="mt-3">
                                <p class="text-sm text-red-500">错误信息: ${task.message || '未知错误'}</p>
                            </div>
                        ` : ''}
                    </div>
                `;
            };

            taskList.innerHTML = `
                ${queuedTasks.map(renderTask).join('')}
                ${processingTasks.map(renderTask).join('')}
                ${errorTasks.map(renderTask).join('')}
                ${completedTasks.map(renderTask).join('')}
            `;
        }

        function getStatusColor(status) {
            switch(status) {
                case 'processing': return 'text-blue-500';
                case 'completed': return 'text-green-500';
                case 'error': return 'text-red-500';
                default: return 'text-yellow-500';
            }
        }

        async function loadZips(page = 1) {
            try {
                const response = await fetch(`${API_BASE}/zips?page=${page}&page_size=10`);
                const result = await response.json();
                renderZipList(result.zips, result.total, result.page, result.has_more);
            } catch (error) {
                console.error('加载ZIP列表失败:', error);
            }
        }

        function renderZipList(zips, total, page, hasMore) {
            const zipList = document.getElementById('zipList');
            const zipTotal = document.getElementById('zipTotal');
            const zipPageEl = document.getElementById('zipPage');
            const zipPrevBtn = document.getElementById('zipPrevBtn');
            const zipNextBtn = document.getElementById('zipNextBtn');
            const zipPagination = document.getElementById('zipPagination');
            
            zipTotal.textContent = total;
            zipPageEl.textContent = page;
            zipHasMore = hasMore;
            zipPage = page;
            
            zipPrevBtn.disabled = page <= 1;
            zipNextBtn.disabled = !hasMore;
            
            if (total > 10) {
                zipPagination.classList.remove('hidden');
            } else {
                zipPagination.classList.add('hidden');
            }
            
            if (zips.length === 0) {
                zipList.innerHTML = `
                    <div class="text-center text-gray-400 py-8">
                        <i class="fa fa-download text-4xl mb-2"></i>
                        <p>暂无成品文件</p>
                    </div>
                `;
                return;
            }

            zipList.innerHTML = zips.map(zip => `
                <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <i class="fa fa-file-archive-o text-purple-500 mr-3"></i>
                            <div>
                                <p class="font-medium text-gray-700">${zip.filename}</p>
                                <p class="text-sm text-gray-400">7天内有效 | 创建于 ${zip.create_time}</p>
                            </div>
                        </div>
                        <a href="${zip.zip_url}" target="_blank" 
                           class="px-4 py-2 bg-purple-500 text-white rounded hover:bg-purple-600">
                            <i class="fa fa-download mr-1"></i>下载
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function initPagination() {
            document.getElementById('taskPrevBtn').addEventListener('click', () => {
                if (taskPage > 1) {
                    loadTasks(taskPage - 1);
                }
            });
            
            document.getElementById('taskNextBtn').addEventListener('click', () => {
                if (taskHasMore) {
                    loadTasks(taskPage + 1);
                }
            });
            
            document.getElementById('zipPrevBtn').addEventListener('click', () => {
                if (zipPage > 1) {
                    loadZips(zipPage - 1);
                }
            });
            
            document.getElementById('zipNextBtn').addEventListener('click', () => {
                if (zipHasMore) {
                    loadZips(zipPage + 1);
                }
            });
        }

        async function showTaskDetail(taskId) {
            const modal = document.getElementById('taskModal');
            const modalContent = document.getElementById('modalContent');
            
            modal.classList.remove('hidden');
            
            try {
                const response = await fetch(`${API_BASE}/task/${taskId}`);
                const task = await response.json();
                
                modalContent.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="font-medium">工单名称</span>
                            <span class="text-gray-500">${task.original_filename || '未知'}</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="font-medium">状态</span>
                            <span class="${getStatusColor(task.status)}">${task.status === 'processing' ? '处理中' : task.status === 'completed' ? '已完成' : task.status === 'error' ? '处理失败' : '排期中'}</span>
                        </div>
                        ${task.status === 'processing' ? `
                            <div>
                                <div class="flex justify-between text-sm text-gray-500 mb-1">
                                    <span>进度</span>
                                    <span>${task.progress || 0}%</span>
                                </div>
                                <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                                    <div class="h-full bg-blue-500 progress-bar" style="width: ${task.progress || 0}%"></div>
                                </div>
                                <p class="text-sm text-gray-400 mt-2">${task.message || ''}</p>
                            </div>
                        ` : task.status === 'error' ? `
                            <div>
                                <p class="text-sm text-red-500">错误信息: ${task.message || '未知错误'}</p>
                            </div>
                        ` : task.status === 'completed' ? `
                            <div>
                                <p class="font-medium mb-2">生成的图片:</p>
                                <div class="grid grid-cols-2 gap-2">
                                    ${task.images && task.images.length > 0 
                                        ? task.images.map((img, i) => `
                                            <div class="relative aspect-square bg-gray-100 rounded overflow-hidden">
                                                <img src="${img}" alt="图片${i+1}" class="w-full h-full object-cover">
                                            </div>
                                        `).join('')
                                        : '<p class="text-gray-400 text-sm">暂无图片</p>'
                                    }
                                </div>
                            </div>
                        ` : ''}
                        ${task.zip_url ? `
                            <div class="pt-4 border-t border-gray-100">
                                <a href="${task.zip_url}" target="_blank" 
                                   class="block w-full text-center py-2 bg-purple-500 text-white rounded hover:bg-purple-600">
                                    <i class="fa fa-download mr-1"></i>下载全部图片(ZIP)
                                </a>
                            </div>
                        ` : ''}
                    </div>
                `;
            } catch (error) {
                modalContent.innerHTML = `
                    <div class="text-center text-gray-400 py-8">
                        <i class="fa fa-exclamation-circle text-4xl mb-2"></i>
                        <p>加载失败: ${error.message}</p>
                    </div>
                `;
            }
        }

        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('taskModal').classList.add('hidden');
        });

        async function deleteTask(taskId) {
            if (!confirm('确定要删除这个工单吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/task/${taskId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                if (result.success) {
                    taskPage = 1;
                    zipPage = 1;
                    loadTasks();
                    loadZips();
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        function startAutoRefresh() {
            refreshInterval = setInterval(() => {
                loadTasks(taskPage);
                loadZips(zipPage);
            }, 3000);
        }

        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });
    </script>
</body>
</html>
